name: omysha-signin

services:

  db:
    image: postgres:16-alpine
    container_name: omysha-signin-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${OMYSHA_SIGNIN_DB_PASSWORD}
      POSTGRES_USER: authentik
      POSTGRES_DB: authentik
    volumes:
      - omysha-signin-pgdata:/var/lib/postgresql/data
    ports:
      - "${OMYSHA_SIGNIN_DB_PORT:-9008}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.omysha.project: "omysha-signin"
      com.omysha.service: "db"
      com.omysha.environment: "development"

  redis:
    image: redis:7-alpine
    container_name: omysha-signin-redis
    restart: unless-stopped
    ports:
      - "${OMYSHA_SIGNIN_REDIS_PORT:-9018}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      com.omysha.project: "omysha-signin"
      com.omysha.service: "redis"
      com.omysha.environment: "development"

  server:
    image: ghcr.io/goauthentik/server:2024.12.3
    container_name: omysha-signin-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: db
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${OMYSHA_SIGNIN_DB_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${OMYSHA_SIGNIN_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    ports:
      - "${OMYSHA_SIGNIN_SERVER_PORT:-3008}:9000"
      - "${OMYSHA_SIGNIN_SERVER_HTTPS_PORT:-3448}:9443"
    volumes:
      - omysha-signin-media:/media
      - omysha-signin-templates:/templates
      - ./product/code/branding:/media/custom:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      com.omysha.project: "omysha-signin"
      com.omysha.service: "server"
      com.omysha.environment: "development"

  worker:
    image: ghcr.io/goauthentik/server:2024.12.3
    container_name: omysha-signin-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: db
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${OMYSHA_SIGNIN_DB_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${OMYSHA_SIGNIN_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - omysha-signin-media:/media
      - omysha-signin-certs:/certs
      - omysha-signin-templates:/templates
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      com.omysha.project: "omysha-signin"
      com.omysha.service: "worker"
      com.omysha.environment: "development"

networks:
  default:
    name: omysha-signin-network

volumes:
  omysha-signin-pgdata:
  omysha-signin-media:
  omysha-signin-certs:
  omysha-signin-templates:
