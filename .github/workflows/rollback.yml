# Rollback Omysha SignIn (Authentik) on Production
#
# Triggered manually. Checks out a specific ref and redeploys.
# Same pattern as deploy-prod but with a rollback reason logged.

name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to rollback to (tag or SHA)'
        required: true
        type: string
      reason:
        description: 'Reason for rollback'
        required: true
        type: string

permissions:
  contents: read

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://signin.omysha.org

    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}

            echo "=== Rolling back to ${{ inputs.ref }} ==="
            echo "Reason: ${{ inputs.reason }}"

            git fetch origin
            git checkout ${{ inputs.ref }}

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            echo "=== Waiting for healthy ==="
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml ps --format json | grep -q '"Health":"healthy"'; then
                echo "Healthy after ${i}s"
                break
              fi
              sleep 2
            done

            echo "=== Applying branding ==="
            if [ -f product/code/branding/apply-branding.sh ]; then
              bash product/code/branding/apply-branding.sh \
                "http://localhost:9010" \
                "${{ secrets.AUTHENTIK_API_TOKEN }}"
            fi

            docker compose -f docker-compose.prod.yml ps

      - name: Verify rollback
        run: |
          sleep 5
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://signin.omysha.org)
          if [ "$STATUS" -ne 200 ] && [ "$STATUS" -ne 302 ]; then
            echo "Rollback health check failed with status $STATUS"
            exit 1
          fi
          echo "Rollback to ${{ inputs.ref }} verified - HTTP $STATUS"
          echo "Reason: ${{ inputs.reason }}"
