# EPIC Template
# doc_id:     VAULT-EPIC-NNN
# template:   epic-template.yaml
# version:    1.1.0
# created:    YYYY-MM-DD
# created_by: [Full Name] ([git-email])
# ---

id: EPIC-NNN
title: "[Epic title — one clear capability statement]"
status: pre_g1                     # pre_g1 | in_progress | done | deferred | cancelled
owner: ~                           # "[Full Name] ([git-email])" or null
created: YYYY-MM-DD
created_by: "[Full Name] ([git-email])"

goal: |
  [What strategic outcome does this EPIC achieve?
  1–3 sentences. Ties to product vision.
  What capability does the product gain when this EPIC is complete?]

background: |
  [Optional context — why this EPIC exists, prior work it builds on,
  constraints inherited from product decisions. Remove if not needed.]

acceptance_criteria_long_term:
  - "[What must be true when this EPIC is fully complete — across all releases]"
  - "[Another acceptance criterion]"

features:
  - FEAT-NNN   # [Feature title — one line comment]

releases:
  vX.Y:
    features_in_scope: [FEAT-NNN]
    status: pre_g1                 # pre_g1 | in_progress | done
    notes: "[Brief note about what this release phase delivers]"

depends_on: []                     # Other EPIC IDs this requires
blocks: []                         # Other EPIC IDs this unblocks

open_questions: []                 # Must be empty before G1 of first release

